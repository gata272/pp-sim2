<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puyo Puyo Simulator</title>

    <meta name="apple-mobile-web-app-title" content="Puyo Sim">
    <meta name="application-name" content="Puyo Sim">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./android-icon-192x192.png">
    <meta name="theme-color" content="#5e81ac">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./online.css">

    <script>
        // 先に最低限の保険を入れる
        window.__bootLogs = window.__bootLogs || [];
        window.__log = function (msg) {
            const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
            window.__bootLogs.push(line);
            console.log(line);

            const box = document.getElementById('boot-log');
            if (box) box.textContent = window.__bootLogs.slice(-40).join('\n');

            try {
                localStorage.setItem('__bootLogs', JSON.stringify(window.__bootLogs.slice(-80)));
            } catch (e) {}
        };

        window.addEventListener('error', function (e) {
            window.__log(`ERROR: ${e.message} @ ${e.filename}:${e.lineno}:${e.colno}`);
        });

        window.addEventListener('unhandledrejection', function (e) {
            window.__log(`PROMISE: ${String(e.reason)}`);
        });

        // ボタンが先に押されても落ちないようにする
        window.showOnlineOverlay = window.showOnlineOverlay || function () {
            window.__log('showOnlineOverlay fallback called');
            const overlay = document.getElementById('online-overlay');
            if (overlay) {
                overlay.style.display = 'flex';
            } else {
                alert('online-overlay がまだ作られていません');
            }
        };

        window.hideOnlineOverlay = window.hideOnlineOverlay || function () {
            const overlay = document.getElementById('online-overlay');
            if (overlay) overlay.style.display = 'none';
        };

        if (new URLSearchParams(location.search).has('debug')) {
            window.__showBootLog = true;
        }
    </script>
</head>
<body>

    <div id="setting-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
        <div class="info-box" style="max-width: 400px; width: 100%; padding: 20px;">
            <h2 style="font-size: 1.2em; margin-bottom: 20px;">設定</h2>

            <div style="margin: 20px 0; text-align: left;">
                <label for="gravity-wait-slider" style="display: block; font-size: 0.9em; color: #ccc; margin-bottom: 10px;">重力待ち時間 (消滅から落下まで)</label>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <input type="range" id="gravity-wait-slider" min="0" max="1000" step="50" value="300" style="flex: 1;" oninput="updateGravityWait(this.value)">
                    <span id="gravity-wait-value" style="font-size: 1em; color: #fff; min-width: 60px;">300ms</span>
                </div>
            </div>

            <div style="margin: 20px 0; text-align: left;">
                <label for="chain-wait-slider" style="display: block; font-size: 0.9em; color: #ccc; margin-bottom: 10px;">連鎖待ち時間 (着地から次連鎖まで)</label>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <input type="range" id="chain-wait-slider" min="0" max="1000" step="50" value="300" style="flex: 1;" oninput="updateChainWait(this.value)">
                    <span id="chain-wait-value" style="font-size: 1em; color: #fff; min-width: 60px;">300ms</span>
                </div>
            </div>

            <p style="font-size: 0.8em; color: #888; margin-top: 10px;">※値が小さいほどアニメーションが速くなります。</p>
            <button id="setting-back-btn" onclick="toggleSettingMode()" style="background-color: #457b9d; color: white; margin-top: 20px; width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 0.9em; font-weight: bold; cursor: pointer;">戻る</button>
        </div>
    </div>

    <div id="wrapper">
        <div id="puyo-board"></div>

        <div id="info-panel">
            <div id="play-info-container" class="play-info">
                <div id="play-next-info" class="info-box info-group-a">
                    <h2>NEXT</h2>
                    <div class="next-puyo-row">
                        <div id="next-puyo-1" class="next-puyo-slot"></div>
                        <div id="next-puyo-2" class="next-puyo-slot"></div>
                    </div>
                </div>

                <div id="play-stats-info">
                    <div id="score-box" class="info-box">
                        <h2>スコア</h2>
                        <span id="score">0</span>
                    </div>
                    <div id="chain-box" class="info-box">
                        <h2>連鎖数</h2>
                        <span id="chain-count">0</span>
                    </div>
                    <div id="ojama-box" class="info-box">
                        <h2>おじゃま</h2>
                        <span id="ojama-count">0</span>
                    </div>
                </div>

                <div id="history-controls" class="common-control">
                    <button id="undo-button" onclick="undoMove()" disabled>一手戻す (U)</button>
                    <button id="redo-button" onclick="redoMove()" disabled>一手やり直す (Y)</button>
                </div>

                <button id="raise-puyo-button" onclick="raisePuyoOneRow()" style="width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 0.85em; font-weight: bold; background-color: #9b59b6; color: white; margin-top: 5px;">1段上げる ↑ (U)</button>

                <div id="play-controls" class="common-control">
                    <button id="auto-drop-toggle-button" onclick="toggleAutoDrop()">自動落下: ON</button>
                    <button id="reset-button-play" onclick="resetGame()" style="margin-top: 5px;">盤面リセット(R)</button>
                    <button class="mode-toggle-btn" onclick="toggleMode()" style="margin-top: 5px;">edit (E)</button>
                    <button class="setting-toggle-btn" onclick="toggleSettingMode()" style="width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 0.85em; font-weight: bold; background-color: #6c757d; color: white; margin-top: 5px;">設定</button>
                    <button id="online-toggle-btn" onclick="showOnlineOverlay()" style="width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 0.85em; font-weight: bold; background-color: #457b9d; color: white; margin-top: 5px;">対戦</button>
                </div>
            </div>

            <div id="edit-info-container" class="edit-info">
                <div id="color-palette" class="info-box edit-group-a">
                    <h2>パレット</h2>
                    <div class="palette-row">
                        <div class="puyo palette-color puyo-1" data-color="1"></div>
                        <div class="puyo palette-color puyo-2" data-color="2"></div>
                        <div class="puyo palette-color puyo-3" data-color="3"></div>
                    </div>
                    <div class="palette-row">
                        <div class="puyo palette-color puyo-4" data-color="4"></div>
                        <div class="puyo palette-color puyo-5" data-color="5"></div>
                        <div class="puyo palette-color puyo-0" data-color="0"></div>
                    </div>
                </div>

                <div id="stage-code-info" class="info-box">
                    <h2>ステージコード</h2>
                    <div style="margin-bottom: 10px;">
                        <textarea id="stage-code-input" placeholder="ステージコードを入力" rows="3" style="width: 100%; box-sizing: border-box; resize: none;"></textarea>
                        <button onclick="loadStageCode()" style="width: 100%; padding: 8px; background-color: #f4a261; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 5px;">コードを読み込む</button>
                    </div>
                    <button onclick="copyStageCode()" style="width: 100%; padding: 8px; background-color: #2a9d8f; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;">コード化 (コピー)</button>
                </div>

                <div id="edit-next-info" class="info-box">
                    <h2>ネクスト設定<br>(左が下にきます)</h2>

                    <div class="next-puyo-row">
                        <div class="next-puyo-slot" id="edit-next-1"></div>
                        <div class="next-puyo-slot" id="edit-next-2"></div>
                    </div>

                    <div id="edit-next-list-container"></div>
                    <button id="apply-next-button" onclick="applyNextPuyos()" style="margin-top:10px; width:100%; padding:8px; background-color: #457b9d; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;">ネクスト設定を適用</button>
                    <button onclick="clearEditNext()" style="margin-top:10px; width:100%; padding:5px; background-color: #e63946; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;">ランダムで再生成</button>
                </div>

                <div id="edit-action-buttons" class="common-control">
                    <div id="mode-toggle-container">
                        <button class="mode-toggle-btn" onclick="toggleMode()">play (E)</button>
                        <button class="setting-toggle-btn" onclick="toggleSettingMode()" style="width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 0.85em; font-weight: bold; background-color: #6c757d; color: white; margin-top: 5px;">設定</button>
                    </div>
                    <div id="reset-button-container">
                        <button id="reset-button-edit" onclick="resetGame(); toggleMode();">盤面リセット (R)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <button class="mobile-btn" id="btn-left">←</button>
        <div class="btn-stack">
            <button class="mobile-btn small-btn" id="btn-soft-drop">1↓</button>
            <button class="mobile-btn small-btn" id="btn-hard-drop">M↓</button>
        </div>
        <button class="mobile-btn" id="btn-right">→</button>
        <button class="mobile-btn" id="btn-rotate-cw">B</button>
        <button class="mobile-btn" id="btn-rotate-ccw">A</button>
    </div>

    <p class="small-text">puyo-sim_ver2.1.1 by gata</p>

    <pre id="boot-log" style="display:none; white-space:pre-wrap; font-size:11px; line-height:1.4; background:#000; color:#ddd; padding:8px; margin:8px; max-width:800px; width:100%; box-sizing:border-box; border:1px solid #444; border-radius:6px;"></pre>

    <script src="./puyoAI.js"></script>
    <script src="./puyoSim.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="./online.js"></script>

    <script>
        if (window.__showBootLog) {
            const box = document.getElementById('boot-log');
            if (box) {
                box.style.display = 'block';
                try {
                    const saved = JSON.parse(localStorage.getItem('__bootLogs') || '[]');
                    if (saved.length) box.textContent = saved.join('\n');
                } catch (e) {}
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {
                    console.log('Service Worker registered successfully:', registration);
                    window.__log && window.__log('Service Worker registered');
                }).catch(function(error) {
                    console.log('Service Worker registration failed:', error);
                    window.__log && window.__log('SW register failed: ' + error);
                });
            });
        }

        window.__log && window.__log('index.html loaded');
    </script>

</body>
</html>
